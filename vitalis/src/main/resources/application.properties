spring.application.name=vitalis

# Banco H2 em memória — só para rodar e testar sem PostgreSQL instalado
# Quando integrar PostgreSQL, troque por spring.datasource.url=jdbc:postgresql://...
spring.datasource.url=jdbc:h2:mem:vitalisdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 disponível em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate recria o schema a cada restart
# TODO: trocar para 'validate' quando integrar PostgreSQL com Flyway/Liquibase
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
